<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babble Box English - Level A1</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           ROOT & RESET
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #FFC107;
            --black: #1A1A1A;
            --white: #FFFFFF;
            --bg: #FAFAFA;
            --text: #1A1A1A;
            --card-bg: #FFFFFF;
            --shadow: 0 8px 30px rgba(0,0,0,0.06);
            --radius: 18px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --green: #4CAF50;
            --red: #F44336;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --text: #F0F0F0;
            --card-bg: #1E1E1E;
            --shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .header {
            background: var(--card-bg);
            padding: 14px 20px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            transition: background var(--transition);
            border-bottom: 2px solid rgba(0,0,0,0.04);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        [data-theme="dark"] .header {
            border-bottom-color: rgba(255,255,255,0.05);
        }

        .header .brand {
            font-family: 'Poppins', sans-serif;
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
            direction: ltr;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header .brand span {
            color: var(--gold);
        }

        .header .level {
            font-size: 13px;
            font-weight: 600;
            color: #888;
            direction: ltr;
        }

        .header .top-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text);
            transition: 0.3s;
            padding: 4px;
        }

        .theme-toggle:hover {
            transform: rotate(20deg);
        }

        .back-btn {
            background: var(--gold);
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            color: var(--black);
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Cairo', sans-serif;
            text-decoration: none;
        }

        .back-btn:hover {
            transform: scale(1.03);
        }

        /* ============================================================
           HERO SECTION
           ============================================================ */
        .hero {
            text-align: center;
            padding: 40px 20px 30px;
            background: linear-gradient(145deg, rgba(255,193,7,0.08) 0%, transparent 100%);
        }

        .hero h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 32px;
            color: var(--text);
            direction: ltr;
        }

        .hero h1 span {
            color: var(--gold);
        }

        .hero p {
            font-size: 16px;
            color: #888;
            margin-top: 6px;
            direction: rtl;
        }

        /* ============================================================
           UNIT GRID
           ============================================================ */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 10px 20px 40px;
        }

        .unit-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .unit-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            transition: 0.3s;
            border: 2px solid transparent;
            position: relative;
        }

        .unit-card:hover:not(.locked) {
            transform: translateY(-4px);
            border-color: var(--gold);
        }

        .unit-card.locked {
            opacity: 0.6;
            filter: grayscale(0.5);
        }

        .unit-card .number {
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--gold);
            direction: ltr;
        }

        .unit-card .title {
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin: 4px 0;
            direction: ltr;
        }

        .unit-card .icon {
            font-size: 32px;
            margin: 4px 0;
        }

        .unit-card .progress-wrap {
            height: 4px;
            background: rgba(0,0,0,0.06);
            border-radius: 10px;
            margin: 8px 0 12px;
            overflow: hidden;
        }

        [data-theme="dark"] .unit-card .progress-wrap {
            background: rgba(255,255,255,0.06);
        }

        .unit-card .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--gold);
            border-radius: 10px;
            transition: width 0.6s ease;
        }

        .unit-card .action-btn {
            background: var(--gold);
            border: none;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            color: var(--black);
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Cairo', sans-serif;
            text-decoration: none;
            display: inline-block;
        }

        .unit-card .action-btn:hover {
            transform: scale(1.03);
        }

        .unit-card .action-btn.locked-btn {
            background: #ccc;
            color: #888;
            cursor: not-allowed;
        }

        .unit-card .lock-icon {
            font-size: 18px;
            margin-right: 4px;
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 768px) {
            .unit-grid {
                grid-template-columns: 1fr 1fr;
            }

            .hero h1 {
                font-size: 24px;
            }

            .header .brand {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .unit-grid {
                grid-template-columns: 1fr;
            }

            .hero h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================
    HEADER
    ============================================================ -->
    <header class="header">
        <div class="brand">Babble <span>Box</span></div>
        <div class="level">Level A1</div>
        <div class="top-actions">
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
        </div>
    </header>

    <!-- ============================================================
    HERO
    ============================================================ -->
    <section class="hero">
        <h1>Babble <span>Box</span> English</h1>
        <p>رحلتك لتعلم الإنجليزية تبدأ هنا. 12 وحدة. اختبار نهائي. شهادة إتمام.</p>
    </section>

    <!-- ============================================================
    UNIT GRID
    ============================================================ -->
    <div class="container">
        <div class="unit-grid" id="unitGrid">
            <!-- Units will be rendered by JavaScript -->
        </div>
    </div>

    <!-- ============================================================
    JAVASCRIPT
    ============================================================ -->
    <script>
        // ============================================================
        // 1. DARK MODE
        // ============================================================
        const themeToggle = document.getElementById('themeToggle');
        let currentTheme = localStorage.getItem('babbleTheme') || 'light';

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('babbleTheme', theme);
            currentTheme = theme;
        }

        setTheme(currentTheme);
        themeToggle.addEventListener('click', function() {
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });

        // ============================================================
        // 2. UNITS DATA
        // ============================================================
        const units = [
            { id: 1, title: 'Hello! How are you?', icon: '👋', progress: 0 },
            { id: 2, title: 'My Family', icon: '👨‍👩‍👦', progress: 0 },
            { id: 3, title: 'Daily Routine', icon: '🌅', progress: 0 },
            { id: 4, title: 'Food & Drinks', icon: '🍕', progress: 0 },
            { id: 5, title: 'My House', icon: '🏠', progress: 0 },
            { id: 6, title: 'Jobs', icon: '💼', progress: 0 },
            { id: 7, title: 'Hobbies', icon: '🎨', progress: 0 },
            { id: 8, title: 'Weather', icon: '☀️', progress: 0 },
            { id: 9, title: 'Shopping', icon: '🛍️', progress: 0 },
            { id: 10, title: 'Travel', icon: '✈️', progress: 0 },
            { id: 11, title: 'Health', icon: '🏥', progress: 0 },
            { id: 12, title: 'Review', icon: '📝', progress: 0 }
        ];

        // ============================================================
        // 3. PROGRESS & UNLOCKING
        // ============================================================
        let maxUnlocked = parseInt(localStorage.getItem('babbleMaxUnit')) || 1;

        // Check if unit 1 is completed (from unit1.html)
        const unit1Completed = localStorage.getItem('babbleUnit1Complete') === 'true';
        if (unit1Completed && maxUnlocked < 2) {
            maxUnlocked = 2;
            localStorage.setItem('babbleMaxUnit', maxUnlocked);
        }

        function renderUnits() {
            const grid = document.getElementById('unitGrid');
            grid.innerHTML = '';

            units.forEach(function(unit) {
                const isUnlocked = unit.id <= maxUnlocked;
                const isCompleted = localStorage.getItem('babbleUnit' + unit.id + 'Complete') === 'true';
                const progress = isCompleted ? 100 : 0;

                const card = document.createElement('div');
                card.className = 'unit-card' + (isUnlocked ? '' : ' locked');

                const lockedIcon = isUnlocked ? '' : '<span class="lock-icon">🔒</span>';

                const btnText = isCompleted ? '✅ مكتملة' : (isUnlocked ? '🚀 ابدأ' : '🔒 مقفلة');
                const btnClass = isUnlocked ? 'action-btn' : 'action-btn locked-btn';
                const btnLink = isUnlocked ? 'unit' + unit.id + '.html' : '#';

                card.innerHTML = `
                    <div class="number">Unit ${String(unit.id).padStart(2, '0')}</div>
                    <div class="title">${unit.title}</div>
                    <div class="icon">${unit.icon}</div>
                    <div class="progress-wrap">
                        <div class="progress-fill" style="width:${progress}%;"></div>
                    </div>
                    <a href="${btnLink}" class="${btnClass}">
                        ${lockedIcon} ${btnText}
                    </a>
                `;

                grid.appendChild(card);
            });
        }

        renderUnits();

        // ============================================================
        // 4. WATCH FOR STORAGE CHANGES (from other tabs)
        // ============================================================
        window.addEventListener('storage', function(e) {
            if (e.key === 'babbleMaxUnit' || e.key.startsWith('babbleUnit')) {
                maxUnlocked = parseInt(localStorage.getItem('babbleMaxUnit')) || 1;
                renderUnits();
            }
        });

        // ============================================================
        // 5. CREATE UNIT FILES (instructions)
        // ============================================================
        console.log('%c📘 Babble Box - Level A1', 'font-size:20px;font-weight:bold;color:#FFC107;');
        console.log('%c✅ index.html is ready!', 'font-size:14px;color:#4CAF50;');
        console.log('%c📌 Next: Create unit1.html through unit12.html files.', 'font-size:14px;color:#888;');
        console.log('%c🔑 maxUnlocked = ' + maxUnlocked, 'font-size:14px;color:#FFC107;');
    </script>

</body>
    </html>
