<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Babble Box – المستوى A1</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ===== المتغيرات العامة والثيم ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        :root {
            --bg-body: #f9f7f2;
            --bg-header: #ffffff;
            --bg-sidebar: #ffffff;
            --bg-content: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1A1A1A;
            --text-secondary: #555555;
            --text-muted: #888888;
            --border: #e6e0d8;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            --yellow: #FFC107;
            --yellow-dark: #e6a800;
            --green: #4CAF50;
            --red: #f44336;
            --blue-bubble: #dbeafe;
            --pink-bubble: #fce4ec;
            --disabled-bg: #f0ede8;
            --disabled-text: #b0aaa0;
        }

        body.dark-mode {
            --bg-body: #121212;
            --bg-header: #1e1e1e;
            --bg-sidebar: #1e1e1e;
            --bg-content: #262626;
            --bg-card: #2c2c2c;
            --text-primary: #f0f0f0;
            --text-secondary: #cccccc;
            --text-muted: #999999;
            --border: #3a3a3a;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            --yellow: #e6a800;
            --blue-bubble: #1a3a5c;
            --pink-bubble: #5c2a3a;
            --disabled-bg: #2c2c2c;
            --disabled-text: #666666;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== شريط التقدم اليومي الصغير ===== */
        .daily-progress-strip {
            background-color: var(--bg-header);
            padding: 4px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }
        .daily-progress-strip .track {
            flex: 1;
            min-width: 80px;
            height: 5px;
            background-color: var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .daily-progress-strip .fill {
            height: 100%;
            width: 0%;
            background-color: var(--yellow);
            border-radius: 8px;
            transition: width 0.4s ease;
        }
        .daily-progress-strip .label {
            white-space: nowrap;
        }

        /* ===== الهيدر ===== */
        .app-header {
            background-color: var(--bg-header);
            padding: 10px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 6px;
        }
        .app-header .brand {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 20px;
            color: var(--yellow);
        }
        .app-header .brand span {
            color: var(--text-primary);
        }
        .app-header .level-badge {
            background-color: var(--yellow);
            color: #1A1A1A;
            padding: 2px 14px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 13px;
        }
        .app-header .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .theme-toggle {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 30px;
        }
        .theme-toggle:hover {
            background-color: var(--border);
        }
        .menu-toggle {
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 8px;
            display: none;
        }
        .menu-toggle:hover {
            background-color: var(--border);
        }

        /* ===== وحدات التقدم الأعلى ===== */
        .unit-progress-bar {
            background-color: var(--bg-header);
            padding: 6px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .unit-progress-bar .track {
            flex: 1;
            height: 6px;
            background-color: var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .unit-progress-bar .fill {
            height: 100%;
            width: 8.33%;
            background-color: var(--yellow);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        /* ===== تخطيط الصفحة ===== */
        .app-container {
            display: flex;
            flex: 1;
            min-height: calc(100vh - 160px);
        }

        /* ===== القائمة الجانبية ===== */
        .sidebar {
            background-color: var(--bg-sidebar);
            border-left: 1px solid var(--border);
            width: 270px;
            padding: 20px 12px;
            overflow-y: auto;
            flex-shrink: 0;
            transition: transform 0.3s ease;
            box-shadow: var(--shadow);
            position: sticky;
            top: 80px;
            height: calc(100vh - 80px);
        }
        .sidebar h3 {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            padding-right: 8px;
        }
        .sidebar ul {
            list-style: none;
        }
        .sidebar li {
            padding: 12px 16px;
            margin-bottom: 6px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
            background-color: transparent;
            color: var(--text-secondary);
        }
        .sidebar li.active {
            background-color: var(--yellow);
            color: #1A1A1A;
            box-shadow: 0 2px 12px rgba(255, 193, 7, 0.3);
        }
        .sidebar li.disabled {
            color: var(--disabled-text);
            cursor: not-allowed;
            background-color: var(--disabled-bg);
        }
        .sidebar li.disabled .lock-icon {
            opacity: 0.6;
        }
        .sidebar li:not(.disabled):not(.active):hover {
            background-color: var(--border);
        }
        .sidebar .unit-num {
            font-size: 13px;
            opacity: 0.7;
            margin-left: 8px;
        }

        /* ===== المحتوى الرئيسي ===== */
        .main-content {
            flex: 1;
            padding: 24px 28px;
            background-color: var(--bg-content);
            overflow-y: auto;
            max-height: calc(100vh - 160px);
        }
        .unit-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .unit-title .badge {
            background-color: var(--yellow);
            color: #1A1A1A;
            padding: 2px 16px;
            border-radius: 30px;
            font-size: 16px;
        }

        /* ===== الأقسام ===== */
        .section-card {
            background-color: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 32px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ===== المحادثة (فقاعات) ===== */
        .conversation {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .bubble {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 18px;
            position: relative;
            font-size: 16px;
            line-height: 1.6;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
        }
        .bubble .speaker {
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 2px;
            opacity: 0.7;
        }
        .bubble .translation {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
            opacity: 0.8;
        }
        .bubble .audio-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            margin-right: 8px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .bubble .audio-btn:hover {
            opacity: 1;
        }
        .bubble.john {
            background-color: var(--blue-bubble);
            align-self: flex-start;
            border-bottom-right-radius: 4px;
        }
        .bubble.sarah {
            background-color: var(--pink-bubble);
            align-self: flex-end;
            border-bottom-left-radius: 4px;
        }

        /* ===== اكتشف بنفسك (Tabs) ===== */
        .discovery-tabs {
            margin-top: 12px;
        }
        .discovery-tabs .tabs-nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .discovery-tabs .tab-btn {
            padding: 8px 18px;
            border: 2px solid var(--border);
            background: transparent;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s;
            font-family: 'Cairo', sans-serif;
        }
        .discovery-tabs .tab-btn.active {
            background-color: var(--yellow);
            border-color: var(--yellow);
            color: #1A1A1A;
        }
        .discovery-tabs .tab-btn:hover:not(.active) {
            background-color: var(--border);
        }
        .discovery-tabs .tab-pane {
            display: none;
            padding: 14px 0;
            border-top: 1px solid var(--border);
            font-size: 16px;
            line-height: 1.8;
        }
        .discovery-tabs .tab-pane.active {
            display: block;
        }

        /* ===== Grammar Lab ===== */
        .grammar-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 16px;
            margin: 12px 0;
        }
        .grammar-table td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }
        .grammar-table tr:last-child td {
            border-bottom: none;
        }
        .grammar-example-box {
            background-color: var(--bg-body);
            padding: 12px 16px;
            border-radius: 12px;
            border-right: 4px solid var(--yellow);
            margin-top: 10px;
            font-size: 15px;
        }

        /* ===== Word Vault (Flip Cards) ===== */
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
        }
        .flip-card {
            perspective: 800px;
            height: 170px;
            cursor: pointer;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease;
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front,
        .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 1px solid var(--border);
            background-color: var(--bg-card);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        .flip-card-front {
            background-color: var(--yellow);
            color: #1A1A1A;
        }
        .flip-card-front .emoji {
            font-size: 34px;
            margin-bottom: 6px;
        }
        .flip-card-front .word {
            font-weight: 700;
            font-size: 18px;
        }
        .flip-card-front .audio-btn-sm {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            margin-top: 6px;
            opacity: 0.7;
        }
        .flip-card-front .audio-btn-sm:hover {
            opacity: 1;
        }
        .flip-card-back {
            transform: rotateY(180deg);
            background-color: var(--bg-card);
            color: var(--text-primary);
        }
        .flip-card-back .meaning {
            font-weight: 700;
            font-size: 20px;
            margin-bottom: 4px;
        }

        /* ===== Challenge Arena ===== */
        .quiz-card {
            background-color: var(--bg-body);
            padding: 18px 20px;
            border-radius: 14px;
            margin-bottom: 16px;
        }
        .quiz-card .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .quiz-options button {
            padding: 12px 18px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg-card);
            cursor: pointer;
            font-size: 16px;
            text-align: right;
            font-family: 'Cairo', sans-serif;
            color: var(--text-primary);
            transition: all 0.2s;
        }
        .quiz-options button:hover:not(.correct):not(.wrong) {
            background-color: var(--border);
        }
        .quiz-options button.correct {
            background-color: var(--green);
            color: white;
            border-color: var(--green);
            animation: shake 0.3s ease;
        }
        .quiz-options button.wrong {
            background-color: var(--red);
            color: white;
            border-color: var(--red);
            animation: shake 0.3s ease;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-8px);
            }
            75% {
                transform: translateX(8px);
            }
        }
        .quiz-progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 600;
        }
        .quiz-result {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            padding: 16px;
            background: var(--bg-card);
            border-radius: 14px;
            border: 2px solid var(--yellow);
            margin-top: 12px;
        }
        .speak-challenge-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: var(--yellow);
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            color: #1A1A1A;
            font-family: 'Cairo', sans-serif;
            margin-top: 16px;
            box-shadow: 0 2px 12px rgba(255, 193, 7, 0.3);
        }
        .speak-challenge-btn:hover {
            transform: scale(1.02);
        }

        /* ===== Power Recap (Mind Map) ===== */
        .mindmap {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px 18px;
            padding: 16px 0;
        }
        .mindmap .center {
            background: var(--yellow);
            color: #1A1A1A;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 20px;
            box-shadow: 0 4px 16px rgba(255, 193, 7, 0.3);
        }
        .mindmap .branch {
            background: var(--bg-body);
            padding: 8px 18px;
            border-radius: 30px;
            border: 2px solid var(--yellow);
            font-weight: 600;
            font-size: 16px;
            color: var(--text-primary);
        }
        .video-link-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            color: var(--text-primary);
            text-decoration: none;
            font-family: 'Cairo', sans-serif;
            margin-top: 12px;
            transition: all 0.2s;
        }
        .video-link-btn:hover {
            border-color: var(--yellow);
            background: var(--yellow);
            color: #1A1A1A;
        }

        /* ===== أزرار التنقل ===== */
        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 12px 32px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Cairo', sans-serif;
            background-color: var(--yellow);
            color: #1A1A1A;
            flex: 1;
            min-width: 120px;
            text-align: center;
        }
        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(255, 193, 7, 0.3);
        }
        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        .nav-btn.secondary {
            background-color: var(--border);
            color: var(--text-secondary);
        }
        .nav-btn.secondary:hover:not(:disabled) {
            background-color: var(--text-secondary);
            color: white;
        }

        /* ===== Streak Notification ===== */
        .streak-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 998;
            display: none;
        }
        .streak-overlay.show {
            display: block;
        }
        .streak-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-header);
            padding: 32px 40px;
            border-radius: 24px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
            border: 3px solid var(--yellow);
            z-index: 999;
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            display: none;
            animation: popIn 0.5s ease;
            max-width: 90%;
            color: var(--text-primary);
        }
        .streak-notification.show {
            display: block;
        }
        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }
        .streak-notification .stars {
            font-size: 44px;
            margin-bottom: 8px;
        }
        /* تأثير نجوم متساقطة (CSS) */
        .star-shower {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }
        .star-shower span {
            position: absolute;
            display: block;
            width: 10px;
            height: 10px;
            background: #FFC107;
            border-radius: 50%;
            animation: fall linear infinite;
            opacity: 0.8;
            box-shadow: 0 0 12px #FFC107;
        }
        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* ===== استجابة ===== */
        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }
            .sidebar {
                position: fixed;
                top: 0;
                right: -300px;
                width: 280px;
                height: 100vh;
                z-index: 200;
                border-left: none;
                border-right: 1px solid var(--border);
                padding-top: 60px;
                transition: right 0.3s ease;
            }
            .sidebar.open {
                right: 0;
            }
            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.4);
                z-index: 199;
            }
            .sidebar-overlay.show {
                display: block;
            }
            .main-content {
                padding: 16px;
            }
            .unit-title {
                font-size: 22px;
            }
            .section-card {
                padding: 18px;
            }
            .bubble {
                max-width: 95%;
                font-size: 15px;
            }
            .vocab-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            }
            .flip-card {
                height: 150px;
            }
            .app-header .brand {
                font-size: 17px;
            }
            .daily-progress-strip {
                font-size: 12px;
                padding: 3px 12px;
            }
            .unit-progress-bar {
                font-size: 12px;
                padding: 4px 12px;
            }
            .mindmap .center {
                font-size: 17px;
                padding: 10px 18px;
            }
            .mindmap .branch {
                font-size: 14px;
                padding: 6px 14px;
            }
        }
        @media (max-width: 480px) {
            .app-header {
                padding: 6px 12px;
            }
            .app-header .brand {
                font-size: 15px;
            }
            .app-header .level-badge {
                font-size: 11px;
                padding: 2px 10px;
            }
            .quiz-options button {
                font-size: 14px;
                padding: 10px 14px;
            }
            .streak-notification {
                padding: 20px 24px;
                font-size: 18px;
            }
            .nav-btn {
                font-size: 14px;
                padding: 10px 20px;
                min-width: 80px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== شريط التقدم اليومي ===== -->
    <div class="daily-progress-strip">
        <span>📊 اليوم:</span>
        <div class="track"><div class="fill" id="dailyFill"></div></div>
        <span class="label" id="dailyLabel">0/3 تمارين</span>
    </div>

    <!-- ===== الهيدر ===== -->
    <header class="app-header">
        <div class="brand">🗃️ <span>Babble</span> Box</div>
        <div class="level-badge">A1</div>
        <div class="header-actions">
            <button class="menu-toggle" id="menuToggle" aria-label="القائمة">☰</button>
            <button class="theme-toggle" id="themeToggle" aria-label="الوضع">🌙</button>
        </div>
    </header>

    <!-- ===== شريط تقدم الوحدات ===== -->
    <div class="unit-progress-bar">
        <span>📖 التقدم:</span>
        <div class="track"><div class="fill" id="unitProgressFill"></div></div>
        <span id="unitProgressLabel">1/12 وحدة</span>
    </div>

    <!-- ===== الحاوية الرئيسية ===== -->
    <div class="app-container">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <nav class="sidebar" id="sidebar">
            <h3>📚 الوحدات</h3>
            <ul id="unitList"></ul>
        </nav>
        <main class="main-content" id="mainContent"></main>
    </div>

    <!-- ===== Streak ===== -->
    <div class="streak-overlay" id="streakOverlay"></div>
    <div class="streak-notification" id="streakNotif">
        <div class="stars">🌟</div>
        <div>🎉 <span id="streakCount">1</span> Day! أنت بطل!</div>
    </div>
    <div class="star-shower" id="starShower"></div>

    <script>
        // ============================================================
        // البيانات
        // ============================================================

        // 12 وحدة — الوحدة 1 فقط نشطة، الباقي Coming Soon
        const UNITS = [
            { id: 1, title: "Hello! How are you?", icon: "👋", active: true },
            ...Array.from({ length: 11 }, (_, i) => ({
                id: i + 2,
                title: `Unit ${i + 2}`,
                icon: "🔒",
                active: false
            }))
        ];

        // بيانات الوحدة الأولى (كاملة)
        const UNIT1_DATA = {
            conversation: [
                { speaker: "John", text: "Hey! How's it going?", translation: "إزيك؟ إيه الأخبار؟" },
                { speaker: "Sarah", text: "Oh, hey! Pretty good, and you?", translation: "أوه، أهلاً! كويسة، وإنت؟" },
                { speaker: "John", text: "Can't complain. By the way, I'm John.", translation: "مش وحشة. بالمناسبة، أنا جون." },
                { speaker: "Sarah", text: "Nice to meet you, John. I'm Sarah.", translation: "فرصة سعيدة، جون. أنا سارة." },
                { speaker: "John", text: "Likewise. So, you new here?", translation: "وأنا كمان. إنت جديدة هنا؟" },
                { speaker: "Sarah", text: "Yeah, just moved in last week.", translation: "أيوة، سكنت الأسبوع اللي فات." },
                { speaker: "John", text: "Well, welcome to the neighborhood!", translation: "أهلاً بيكي في الحتة!" }
            ],
            vocabulary: [
                { word: "Hello", meaning: "أهلاً", emoji: "🖐️" },
                { word: "Goodbye", meaning: "مع السلامة", emoji: "👋" },
                { word: "Please", meaning: "من فضلك", emoji: "🙏" },
                { word: "Thank you", meaning: "شكراً", emoji: "🙏" },
                { word: "Sorry", meaning: "آسف", emoji: "😔" }
            ],
            grammar: {
                title: "Verb to be – المضارع",
                table: [
                    ["I", "am", "I'm"],
                    ["He", "is", "He's"],
                    ["She", "is", "She's"],
                    ["It", "is", "It's"],
                    ["You", "are", "You're"],
                    ["We", "are", "We're"],
                    ["They", "are", "They're"]
                ],
                examples: ["I'm John.", "You're new here.", "He's my friend."]
            },
            practice: [
                { question: "I ____ a student.", options: ["am", "is", "are"], correct: 0 },
                { question: "She ____ my friend.", options: ["am", "is", "are"], correct: 1 },
                { question: "They ____ happy.", options: ["am", "is", "are"], correct: 2 }
            ]
        };

        // ============================================================
        // الحالة العامة
        // ============================================================
        let state = {
            currentUnit: 1,
            darkMode: false,
            streak: 0,
            dailyCompleted: 0,
            quizAnswers: {} // { unit_1: [0, 1, 2] } indices of answers
        };

        // ============================================================
        // localStorage
        // ============================================================
        function loadState() {
            try {
                const raw = localStorage.getItem('babblebox_state');
                if (raw) {
                    const parsed = JSON.parse(raw);
                    state = { ...state, ...parsed };
                }
            } catch (_) { /* ignore */ }
            if (state.darkMode) {
                document.body.classList.add('dark-mode');
                document.getElementById('themeToggle').textContent = '☀️';
            }
            updateDailyUI();
            updateUnitProgress();
        }

        function saveState() {
            try {
                localStorage.setItem('babblebox_state', JSON.stringify(state));
            } catch (_) { /* ignore */ }
        }

        // ============================================================
        // تحديثات UI صغيرة
        // ============================================================
        function updateDailyUI() {
            const completed = state.dailyCompleted || 0;
            const total = 3;
            const pct = Math.min((completed / total) * 100, 100);
            document.getElementById('dailyFill').style.width = pct + '%';
            document.getElementById('dailyLabel').textContent = `${completed}/${total} تمارين`;
        }

        function updateUnitProgress() {
            const done = state.currentUnit;
            const total = UNITS.length;
            const pct = (done / total) * 100;
            document.getElementById('unitProgressFill').style.width = pct + '%';
            document.getElementById('unitProgressLabel').textContent = `${done}/${total} وحدة`;
        }

        // ============================================================
        // القائمة الجانبية
        // ============================================================
        function renderSidebar() {
            const list = document.getElementById('unitList');
            list.innerHTML = '';
            UNITS.forEach((u, idx) => {
                const li = document.createElement('li');
                li.dataset.unit = u.id;
                if (u.id === state.currentUnit && u.active) li.classList.add('active');
                if (!u.active) li.classList.add('disabled');
                li.innerHTML = `
                    <span>${u.icon} ${u.title}</span>
                    <span class="unit-num">${!u.active ? '🔒' : ''}</span>
                `;
                if (u.active) {
                    li.addEventListener('click', () => switchUnit(u.id));
                }
                list.appendChild(li);
            });
        }

        // ============================================================
        // التبديل بين الوحدات (حالياً وحدة واحدة فقط)
        // ============================================================
        function switchUnit(id) {
            const unit = UNITS.find(u => u.id === id);
            if (!unit || !unit.active) return;
            state.currentUnit = id;
            saveState();
            renderSidebar();
            renderUnit1();
            closeSidebar();
            document.getElementById('mainContent').scrollTop = 0;
            updateUnitProgress();
        }

        // ============================================================
        // نطق النصوص (Speech Synthesis)
        // ============================================================
        function speakText(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'en-US';
            utter.rate = 0.85;
            window.speechSynthesis.speak(utter);
        }

        // ============================================================
        // عرض الوحدة 1 (كاملة)
        // ============================================================
        function renderUnit1() {
            const data = UNIT1_DATA;
            const main = document.getElementById('mainContent');

            let html = `
                <div class="unit-title">
                    👋 Unit 1: Hello! How are you?
                    <span class="badge">A1</span>
                </div>
            `;

            // ---- 1. المحادثة ----
            html += `<div class="section-card" id="sec-conversation">
                <div class="section-title">🗣️ The Real Talk</div>
                <div class="conversation">`;
            data.conversation.forEach((msg, idx) => {
                const cls = msg.speaker.toLowerCase();
                const audioFile = `unit1_${idx+1}.mp3`; // افتراضي
                html += `
                    <div class="bubble ${cls}">
                        <div class="speaker">${msg.speaker}</div>
                        ${msg.text}
                        <button class="audio-btn" data-audio="${audioFile}" data-text="${msg.text}" aria-label="استماع">🔊</button>
                        <div class="translation">${msg.translation}</div>
                    </div>
                `;
            });
            html += `</div></div>`;

            // ---- 2. اكتشف بنفسك ----
            html += `<div class="section-card" id="sec-discovery">
                <div class="section-title">🔍 اكتشف بنفسك!</div>
                <div style="font-size:17px;font-weight:600;margin-bottom:8px;">
                    ❓ لاحظت إن John قال "I'm John"... وSarah قالت "You're new here"... إيه الفرق؟
                </div>
                <div class="discovery-tabs">
                    <div class="tabs-nav">
                        <button class="tab-btn active" data-tab="0">I am</button>
                        <button class="tab-btn" data-tab="1">You are</button>
                        <button class="tab-btn" data-tab="2">He/She is</button>
                    </div>
                    <div class="tab-pane active" data-pane="0">📘 نستخدم <strong>I am</strong> لما أتكلم عن نفسي.<br>مثال: <em>I am John.</em></div>
                    <div class="tab-pane" data-pane="1">📘 نستخدم <strong>You are</strong> لما أكلم الشخص اللي قدامي.<br>مثال: <em>You are new here.</em></div>
                    <div class="tab-pane" data-pane="2">📘 نستخدم <strong>He is</strong> أو <strong>She is</strong> لما نتكلم عن شخص تالت.<br>مثال: <em>He is my friend.</em></div>
                </div>
            </div>`;

            // ---- 3. القواعد ----
            html += `<div class="section-card" id="sec-grammar">
                <div class="section-title">🧪 Grammar Lab</div>
                <div style="font-weight:600;font-size:17px;margin-bottom:8px;">${data.grammar.title}</div>
                <table class="grammar-table">
                    <tr><td><strong>I</strong></td><td>am</td><td>I'm</td></tr>
                    <tr><td><strong>He</strong></td><td>is</td><td>He's</td></tr>
                    <tr><td><strong>She</strong></td><td>is</td><td>She's</td></tr>
                    <tr><td><strong>It</strong></td><td>is</td><td>It's</td></tr>
                    <tr><td><strong>You</strong></td><td>are</td><td>You're</td></tr>
                    <tr><td><strong>We</strong></td><td>are</td><td>We're</td></tr>
                    <tr><td><strong>They</strong></td><td>are</td><td>They're</td></tr>
                </table>
                <div style="font-weight:600;margin-top:12px;">📌 أمثلة من المحادثة:</div>
                <div class="grammar-example-box">
                    ${data.grammar.examples.map(ex => `“${ex}”`).join(' • ')}
                </div>
            </div>`;

            // ---- 4. المفردات ----
            html += `<div class="section-card" id="sec-vocab">
                <div class="section-title">💎 Word Vault</div>
                <div class="vocab-grid">`;
            data.vocabulary.forEach((item) => {
                html += `
                    <div class="flip-card" data-word="${item.word}">
                        <div class="flip-card-inner">
                            <div class="flip-card-front">
                                <div class="emoji">${item.emoji}</div>
                                <div class="word">${item.word}</div>
                                <button class="audio-btn-sm" data-text="${item.word}" aria-label="نطق">🔊</button>
                                <span style="font-size:11px;opacity:0.6;margin-top:4px;">👆 اضغط للقلب</span>
                            </div>
                            <div class="flip-card-back">
                                <div class="meaning">${item.meaning}</div>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += `</div></div>`;

            // ---- 5. التمرين ----
            const unitKey = 'unit_1';
            const savedAnswers = state.quizAnswers[unitKey] || [];
            let completedCount = savedAnswers.filter(a => a !== undefined).length;
            // نحدد عدد الأسئلة المكتملة من التخزين
            const totalQ = data.practice.length;

            html += `<div class="section-card" id="sec-practice">
                <div class="section-title">⚔️ Challenge Arena</div>
                <div class="quiz-progress-text">
                    <span>📌 السؤال 1 من ${totalQ}</span>
                    <span>✅ ${completedCount}/${totalQ}</span>
                </div>
                <div id="quizContainer">`;

            data.practice.forEach((q, idx) => {
                const selected = savedAnswers[idx] !== undefined ? savedAnswers[idx] : -1;
                const isAnswered = selected !== -1;
                html += `<div class="quiz-card" data-q="${idx}">
                    <div class="question-text">${idx+1}. ${q.question}</div>
                    <div class="quiz-options">`;
                q.options.forEach((opt, optIdx) => {
                    let cls = '';
                    if (isAnswered) {
                        if (optIdx === q.correct) cls = 'correct';
                        else if (optIdx === selected && optIdx !== q.correct) cls = 'wrong';
                    }
                    html += `<button class="${cls}" data-q="${idx}" data-opt="${optIdx}" ${isAnswered ? 'disabled' : ''}>${opt}</button>`;
                });
                html += `</div></div>`;
            });

            // نتيجة إذا اكتمل الكل
            let resultHtml = '';
            if (completedCount === totalQ) {
                const allCorrect = savedAnswers.every((ans, i) => ans === data.practice[i].correct);
                if (allCorrect) {
                    resultHtml = `<div class="quiz-result" style="border-color:var(--green);color:var(--green);">🎉 3/3! أحسنت!</div>`;
                } else {
                    resultHtml = `<div class="quiz-result" style="border-color:var(--red);color:var(--red);">📝 3/3 — راجع الأخطاء</div>`;
                }
            }
            html += resultHtml;

            // زر التحدي الصوتي
            html += `
                <button class="speak-challenge-btn" id="speakChallenge">🎤 تحدث الآن! عرّف عن نفسك</button>
            `;

            html += `</div></div>`;

            // ---- 6. ملخص القوة ----
            html += `<div class="section-card" id="sec-recap">
                <div class="section-title">⚡ Power Recap</div>
                <div class="mindmap">
                    <div class="center">Verb to be</div>
                    <div class="branch">I am</div>
                    <div class="branch">You are</div>
                    <div class="branch">He is</div>
                    <div class="branch">She is</div>
                    <div class="branch">It is</div>
                    <div class="branch">We are</div>
                    <div class="branch">They are</div>
                </div>
                <div style="margin-top:12px;">
                    <a class="video-link-btn" href="https://youtube.com/@omar.youssif.english" target="_blank">
                        🎥 شاهد شرح الوحدة على يوتيوب
                    </a>
                </div>
            </div>`;

            // ---- أزرار التنقل ----
            html += `
                <div class="nav-buttons">
                    <button class="nav-btn secondary" id="prevBtn" disabled>⬅ السابق</button>
                    <button class="nav-btn" id="nextBtn">التالي ➡</button>
                </div>
            `;

            main.innerHTML = html;

            // ===== ربط الأحداث =====

            // 1. أزرار الصوت في المحادثة
            document.querySelectorAll('.bubble .audio-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const text = this.dataset.text;
                    if (text) speakText(text);
                    // يمكن استخدام data-audio لملفات MP3 لاحقاً
                });
            });

            // 2. صوت المفردات
            document.querySelectorAll('.flip-card .audio-btn-sm').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const text = this.dataset.text;
                    if (text) speakText(text);
                    // منع قلب البطاقة عند الضغط على الصوت
                    e.stopPropagation();
                });
            });

            // 3. قلب البطاقات
            document.querySelectorAll('.flip-card').forEach(card => {
                card.addEventListener('click', function() {
                    this.classList.toggle('flipped');
                });
            });

            // 4. Tabs الاكتشاف
            document.querySelectorAll('.discovery-tabs .tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const idx = this.dataset.tab;
                    document.querySelectorAll('.discovery-tabs .tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.discovery-tabs .tab-pane').forEach(p => p.classList.remove('active'));
                    this.classList.add('active');
                    document.querySelector(`.discovery-tabs .tab-pane[data-pane="${idx}"]`).classList.add('active');
                });
            });

            // 5. أسئلة التمرين
            document.querySelectorAll('.quiz-options button:not([disabled])').forEach(btn => {
                btn.addEventListener('click', function() {
                    const qIdx = parseInt(this.dataset.q);
                    const optIdx = parseInt(this.dataset.opt);
                    const qData = data.practice[qIdx];
                    const isCorrect = optIdx === qData.correct;

                    // تعطيل الأزرار في هذا السؤال
                    const container = this.closest('.quiz-options');
                    container.querySelectorAll('button').forEach(b => b.disabled = true);

                    // تلوين
                    container.querySelectorAll('button').forEach(b => {
                        const idx = parseInt(b.dataset.opt);
                        if (idx === qData.correct) b.classList.add('correct');
                        else if (idx === optIdx && !isCorrect) b.classList.add('wrong');
                    });

                    // حفظ
                    const key = 'unit_1';
                    if (!state.quizAnswers[key]) state.quizAnswers[key] = [];
                    state.quizAnswers[key][qIdx] = optIdx;

                    // تحديث التقدم اليومي
                    const answers = state.quizAnswers[key];
                    const done = answers.filter(a => a !== undefined).length;
                    state.dailyCompleted = done;
                    saveState();
                    updateDailyUI();

                    // إعادة عرض التمرين لتحديث شريط التقدم والنتيجة
                    renderUnit1();

                    // إذا اكتمل 3/3 => Streak
                    if (done === totalQ) {
                        const allCorrect = answers.every((ans, i) => ans === data.practice[i].correct);
                        if (allCorrect) {
                            showStreak();
                        }
                    }
                });
            });

            // 6. زر التحدي الصوتي
            document.getElementById('speakChallenge').addEventListener('click', function() {
                const msg = "Hello, my name is... I am a student.";
                speakText(msg);
                // عرض رسالة منبثقة بسيطة
                alert("🗣️ تكلم الآن: Hello, my name is... I am a student.");
            });

            // 7. أزرار التنقل
            document.getElementById('prevBtn').addEventListener('click', () => {
                // معطل في الوحدة الأولى
            });
            document.getElementById('nextBtn').addEventListener('click', () => {
                // لا توجد وحدة تالية نشطة حالياً
                alert('🔒 الوحدات القادمة قيد التطوير!');
            });

            // تمرير سلس لأول قسم
            setTimeout(() => {
                const first = document.querySelector('.section-card');
                if (first) first.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 150);
        }

        // ============================================================
        // Streak + نجوم متساقطة
        // ============================================================
        function showStreak() {
            state.streak = (state.streak || 0) + 1;
            saveState();
            document.getElementById('streakCount').textContent = state.streak;
            document.getElementById('streakNotif').classList.add('show');
            document.getElementById('streakOverlay').classList.add('show');

            // نجوم متساقطة
            const shower = document.getElementById('starShower');
            shower.innerHTML = '';
            for (let i = 0; i < 40; i++) {
                const star = document.createElement('span');
                const size = 4 + Math.random() * 10;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.animationDuration = (2 + Math.random() * 4) + 's';
                star.style.animationDelay = (Math.random() * 2) + 's';
                star.style.background = ['#FFC107', '#FFD54F', '#FFA000', '#FF6F00'][Math.floor(Math.random() * 4)];
                shower.appendChild(star);
            }
            setTimeout(() => {
                shower.innerHTML = '';
            }, 5000);

            setTimeout(() => {
                document.getElementById('streakNotif').classList.remove('show');
                document.getElementById('streakOverlay').classList.remove('show');
            }, 3500);
        }

        // ============================================================
        // القائمة الجانبية للموبايل
        // ============================================================
        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebarOverlay').classList.add('show');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('show');
        }
        document.getElementById('menuToggle').addEventListener('click', openSidebar);
        document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

        // ============================================================
        // الوضع الليلي
        // ============================================================
        document.getElementById('themeToggle').addEventListener('click', function() {
            state.darkMode = !state.darkMode;
            document.body.classList.toggle('dark-mode');
            this.textContent = state.darkMode ? '☀️' : '🌙';
            saveState();
        });

        // ============================================================
        // تهيئة التطبيق
        // ============================================================
        function init() {
            loadState();
            renderSidebar();
            renderUnit1();
            updateUnitProgress();
        }

        init();
    </script>
</body>
    </html>
