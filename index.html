<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Babble Box - المستوى A1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== المتغيرات العامة ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        :root {
            --bg-body: #f8f5f0;
            --bg-header: #ffffff;
            --bg-sidebar: #ffffff;
            --bg-content: #ffffff;
            --text-primary: #1A1A1A;
            --text-secondary: #555555;
            --text-light: #888888;
            --border-color: #e0dcd5;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --yellow: #FFC107;
            --yellow-dark: #e6a800;
            --green: #4CAF50;
            --red: #f44336;
            --blue-bubble: #dbeafe;
            --pink-bubble: #fce4ec;
            --card-bg: #ffffff;
            --disabled-bg: #f0ede8;
            --disabled-text: #b0aaa0;
        }

        body.dark-mode {
            --bg-body: #121212;
            --bg-header: #1e1e1e;
            --bg-sidebar: #1e1e1e;
            --bg-content: #2a2a2a;
            --text-primary: #f0f0f0;
            --text-secondary: #cccccc;
            --text-light: #999999;
            --border-color: #333333;
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
            --yellow: #e6a800;
            --card-bg: #2a2a2a;
            --disabled-bg: #2a2a2a;
            --disabled-text: #666666;
            --blue-bubble: #1a3a5c;
            --pink-bubble: #5c2a3a;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== شريط التقدم اليومي ===== */
        .daily-progress-bar {
            background-color: var(--bg-header);
            padding: 6px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }
        .daily-progress-bar .bar-track {
            flex: 1;
            min-width: 100px;
            height: 6px;
            background-color: var(--border-color);
            border-radius: 10px;
            overflow: hidden;
        }
        .daily-progress-bar .bar-fill {
            height: 100%;
            width: 0%;
            background-color: var(--yellow);
            border-radius: 10px;
            transition: width 0.4s ease;
        }
        .daily-progress-bar .bar-label {
            white-space: nowrap;
        }

        /* ===== الهيدر ===== */
        .app-header {
            background-color: var(--bg-header);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 8px;
        }
        .app-header .brand {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 22px;
            color: var(--yellow);
            letter-spacing: -0.5px;
        }
        .app-header .brand span {
            color: var(--text-primary);
        }
        .app-header .level-badge {
            background-color: var(--yellow);
            color: #1A1A1A;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 14px;
        }
        .app-header .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .theme-toggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 30px;
        }
        .theme-toggle:hover {
            background-color: var(--border-color);
        }
        .menu-toggle {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 8px;
            display: none;
        }
        .menu-toggle:hover {
            background-color: var(--border-color);
        }

        /* ===== القائمة الجانبية ===== */
        .app-container {
            display: flex;
            flex: 1;
            min-height: calc(100vh - 130px);
        }
        .sidebar {
            background-color: var(--bg-sidebar);
            border-left: 1px solid var(--border-color);
            width: 280px;
            padding: 20px 12px;
            overflow-y: auto;
            flex-shrink: 0;
            transition: transform 0.3s ease;
            box-shadow: var(--shadow);
            position: sticky;
            top: 80px;
            height: calc(100vh - 80px);
        }
        .sidebar h3 {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            padding-right: 8px;
        }
        .sidebar ul {
            list-style: none;
        }
        .sidebar li {
            padding: 12px 16px;
            margin-bottom: 6px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
            background-color: transparent;
            color: var(--text-secondary);
        }
        .sidebar li.active {
            background-color: var(--yellow);
            color: #1A1A1A;
            box-shadow: 0 2px 12px rgba(255, 193, 7, 0.3);
        }
        .sidebar li.disabled {
            color: var(--disabled-text);
            cursor: not-allowed;
            background-color: var(--disabled-bg);
        }
        .sidebar li.disabled .lock-icon {
            opacity: 0.6;
        }
        .sidebar li:not(.disabled):not(.active):hover {
            background-color: var(--border-color);
        }
        .sidebar .unit-number {
            font-size: 13px;
            opacity: 0.7;
            margin-left: 8px;
        }

        /* ===== المحتوى الرئيسي ===== */
        .main-content {
            flex: 1;
            padding: 24px 30px;
            background-color: var(--bg-content);
            overflow-y: auto;
            max-height: calc(100vh - 80px);
        }
        .unit-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .unit-title span {
            background-color: var(--yellow);
            color: #1A1A1A;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 18px;
        }

        /* ===== أقسام الوحدة ===== */
        .section {
            margin-bottom: 40px;
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ===== المحادثة ===== */
        .conversation {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .bubble {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 18px;
            position: relative;
            font-size: 16px;
            line-height: 1.6;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .bubble .speaker {
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 4px;
            opacity: 0.7;
        }
        .bubble .translation {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 4px;
            opacity: 0.8;
        }
        .bubble .audio-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            margin-right: 8px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .bubble .audio-btn:hover {
            opacity: 1;
        }
        .bubble.john {
            background-color: var(--blue-bubble);
            align-self: flex-start;
            border-bottom-right-radius: 4px;
        }
        .bubble.sarah {
            background-color: var(--pink-bubble);
            align-self: flex-end;
            border-bottom-left-radius: 4px;
        }

        /* ===== بطاقات المفردات ===== */
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
        }
        .flip-card {
            perspective: 800px;
            height: 180px;
            cursor: pointer;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease;
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .flip-card-front {
            background-color: var(--yellow);
            color: #1A1A1A;
        }
        .flip-card-front .emoji {
            font-size: 36px;
            margin-bottom: 8px;
        }
        .flip-card-front .word {
            font-weight: 700;
            font-size: 18px;
        }
        .flip-card-back {
            transform: rotateY(180deg);
            background-color: var(--card-bg);
            color: var(--text-primary);
        }
        .flip-card-back .meaning {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 6px;
        }
        .flip-card-back .example {
            font-size: 14px;
            color: var(--text-light);
        }

        /* ===== القواعد (Tabs) ===== */
        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .tab-btn {
            padding: 8px 18px;
            border: 2px solid var(--border-color);
            background: transparent;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s;
            font-family: 'Cairo', sans-serif;
        }
        .tab-btn.active {
            background-color: var(--yellow);
            border-color: var(--yellow);
            color: #1A1A1A;
        }
        .tab-btn:hover:not(.active) {
            background-color: var(--border-color);
        }
        .tab-content {
            display: none;
            padding: 16px 0;
            border-top: 1px solid var(--border-color);
        }
        .tab-content.active {
            display: block;
        }
        .tab-content .grammar-example {
            background-color: var(--bg-body);
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 8px;
            font-size: 15px;
            border-right: 4px solid var(--yellow);
        }

        /* ===== التمرين ===== */
        .quiz-card {
            background-color: var(--bg-body);
            padding: 20px;
            border-radius: 14px;
            margin-bottom: 16px;
        }
        .quiz-card .question {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .quiz-options button {
            padding: 12px 18px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background: var(--card-bg);
            cursor: pointer;
            font-size: 16px;
            text-align: right;
            font-family: 'Cairo', sans-serif;
            color: var(--text-primary);
            transition: all 0.2s;
        }
        .quiz-options button:hover:not(.correct):not(.wrong) {
            background-color: var(--border-color);
        }
        .quiz-options button.correct {
            background-color: var(--green);
            color: white;
            border-color: var(--green);
            animation: shake 0.3s ease;
        }
        .quiz-options button.wrong {
            background-color: var(--red);
            color: white;
            border-color: var(--red);
            animation: shake 0.3s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .quiz-progress {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .quiz-progress .track {
            flex: 1;
            height: 6px;
            background: var(--border-color);
            border-radius: 10px;
            overflow: hidden;
        }
        .quiz-progress .fill {
            height: 100%;
            width: 0%;
            background: var(--yellow);
            border-radius: 10px;
            transition: width 0.3s;
        }

        /* ===== أزرار التنقل ===== */
        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Cairo', sans-serif;
            background-color: var(--yellow);
            color: #1A1A1A;
        }
        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 193, 7, 0.3);
        }
        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        .nav-btn.secondary {
            background-color: var(--border-color);
            color: var(--text-secondary);
        }
        .nav-btn.secondary:hover {
            background-color: var(--text-secondary);
            color: white;
        }

        /* ===== Streak Notification ===== */
        .streak-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-header);
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 2px solid var(--yellow);
            z-index: 999;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            display: none;
            animation: popIn 0.5s ease;
            max-width: 90%;
        }
        .streak-notification.show {
            display: block;
        }
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .streak-notification .stars {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .streak-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 998;
            display: none;
        }
        .streak-overlay.show {
            display: block;
        }

        /* ===== الفيديو ===== */
        .video-btn {
            position: fixed;
            bottom: 24px;
            left: 24px;
            background: var(--yellow);
            border: none;
            border-radius: 60px;
            padding: 16px 22px;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 193, 7, 0.4);
            transition: transform 0.2s;
            z-index: 50;
        }
        .video-btn:hover {
            transform: scale(1.08);
        }

        /* ===== استجابة ===== */
        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }
            .sidebar {
                position: fixed;
                top: 0;
                right: -300px;
                width: 280px;
                height: 100vh;
                z-index: 200;
                border-left: none;
                border-right: 1px solid var(--border-color);
                padding-top: 60px;
                transition: right 0.3s ease;
            }
            .sidebar.open {
                right: 0;
            }
            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.4);
                z-index: 199;
            }
            .sidebar-overlay.show {
                display: block;
            }
            .main-content {
                padding: 16px;
            }
            .unit-title {
                font-size: 22px;
            }
            .section {
                padding: 16px;
            }
            .bubble {
                max-width: 95%;
                font-size: 15px;
            }
            .vocab-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            }
            .flip-card {
                height: 150px;
            }
            .app-header .brand {
                font-size: 18px;
            }
            .daily-progress-bar {
                font-size: 12px;
                padding: 4px 12px;
            }
        }
        @media (max-width: 480px) {
            .app-header {
                padding: 8px 12px;
            }
            .app-header .brand {
                font-size: 16px;
            }
            .app-header .level-badge {
                font-size: 12px;
                padding: 2px 10px;
            }
            .quiz-options button {
                font-size: 14px;
                padding: 10px 14px;
            }
            .streak-notification {
                padding: 20px 24px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== شريط التقدم اليومي ===== -->
    <div class="daily-progress-bar">
        <span>📊 اليوم:</span>
        <div class="bar-track">
            <div class="bar-fill" id="dailyProgressFill"></div>
        </div>
        <span class="bar-label" id="dailyProgressLabel">0/3 تمارين</span>
    </div>

    <!-- ===== الهيدر ===== -->
    <header class="app-header">
        <div class="brand">
            📚 <span>Babble</span> Box
        </div>
        <div class="level-badge">A1</div>
        <div class="header-actions">
            <button class="menu-toggle" id="menuToggle" aria-label="القائمة">☰</button>
            <button class="theme-toggle" id="themeToggle" aria-label="تبديل الوضع">🌙</button>
        </div>
    </header>

    <!-- ===== القائمة الجانبية + المحتوى ===== -->
    <div class="app-container">
        <!-- Sidebar Overlay (للموبايل) -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- القائمة الجانبية -->
        <nav class="sidebar" id="sidebar">
            <h3>📖 الوحدات</h3>
            <ul id="unitList">
                <!-- سيتم إنشاؤها بواسطة JavaScript -->
            </ul>
        </nav>

        <!-- المحتوى الرئيسي -->
        <main class="main-content" id="mainContent">
            <!-- سيتم إنشاؤه بواسطة JavaScript -->
        </main>
    </div>

    <!-- ===== زر الفيديو ===== -->
    <button class="video-btn" id="videoBtn" aria-label="فيديو">🎥</button>

    <!-- ===== Streak Notification ===== -->
    <div class="streak-overlay" id="streakOverlay"></div>
    <div class="streak-notification" id="streakNotification">
        <div class="stars">🌟</div>
        <div>🎉 Streak: <span id="streakCount">1</span> Day!</div>
    </div>

    <script>
        // ============================================================
        // البيانات
        // ============================================================

        // بيانات الوحدات (حالياً الوحدة 1 فقط، والباقي Coming Soon)
        const unitsData = [
            {
                id: 1,
                title: "Hello! How are you?",
                icon: "👋",
                active: true,
                content: {
                    conversation: [
                        { speaker: "John", text: "Hello! How are you?", translation: "مرحباً! كيف حالك؟" },
                        { speaker: "Sarah", text: "I'm fine, thank you! And you?", translation: "أنا بخير، شكراً! وأنت؟" },
                        { speaker: "John", text: "I'm great, thanks!", translation: "أنا رائع، شكراً!" }
                    ],
                    vocabulary: [
                        { word: "Hello", meaning: "مرحباً", emoji: "👋", example: "Hello, my name is John." },
                        { word: "How", meaning: "كيف", emoji: "❓", example: "How are you?" },
                        { word: "Fine", meaning: "بخير", emoji: "😊", example: "I am fine." },
                        { word: "Thank you", meaning: "شكراً لك", emoji: "🙏", example: "Thank you very much!" },
                        { word: "Great", meaning: "رائع", emoji: "⭐", example: "You are great!" }
                    ],
                    grammar: {
                        title: "Verb 'to be' - Present",
                        tabs: [
                            { label: "I am", content: "I am happy.<br>I am a student." },
                            { label: "He/She/It is", content: "She is nice.<br>He is a teacher." },
                            { label: "You/We/They are", content: "You are kind.<br>We are friends." }
                        ]
                    },
                    practice: [
                        { question: "How _____ you?", options: ["am", "is", "are"], correct: 2 },
                        { question: "I _____ fine.", options: ["am", "is", "are"], correct: 0 },
                        { question: "She _____ a teacher.", options: ["am", "is", "are"], correct: 1 }
                    ]
                }
            },
            // الوحدات 2-12: معطلة (Coming Soon)
            ...Array.from({ length: 11 }, (_, i) => ({
                id: i + 2,
                title: `Unit ${i + 2}`,
                icon: "🔒",
                active: false
            }))
        ];

        // ============================================================
        // الحالة العامة
        // ============================================================
        let state = {
            currentUnit: 1,
            darkMode: false,
            streak: 0,
            dailyCompleted: 0,
            // لكل وحدة: تخزين تقدم التمارين
            quizProgress: {}
        };

        // ============================================================
        // تحميل الحالة من localStorage
        // ============================================================
        function loadState() {
            try {
                const saved = localStorage.getItem('babblebox_state');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    state = { ...state, ...parsed };
                }
            } catch (e) { /* ignore */ }
            // تطبيق الوضع الليلي
            if (state.darkMode) {
                document.body.classList.add('dark-mode');
                document.getElementById('themeToggle').textContent = '☀️';
            }
            // تحديث شريط التقدم
            updateDailyProgress();
        }

        // ============================================================
        // حفظ الحالة
        // ============================================================
        function saveState() {
            try {
                localStorage.setItem('babblebox_state', JSON.stringify(state));
            } catch (e) { /* ignore */ }
        }

        // ============================================================
        // تحديث شريط التقدم اليومي
        // ============================================================
        function updateDailyProgress() {
            const fill = document.getElementById('dailyProgressFill');
            const label = document.getElementById('dailyProgressLabel');
            const completed = state.dailyCompleted || 0;
            const total = 3;
            const pct = Math.min((completed / total) * 100, 100);
            fill.style.width = pct + '%';
            label.textContent = `${completed}/${total} تمارين`;
        }

        // ============================================================
        // إنشاء القائمة الجانبية
        // ============================================================
        function renderSidebar() {
            const list = document.getElementById('unitList');
            list.innerHTML = '';
            unitsData.forEach((unit, index) => {
                const li = document.createElement('li');
                const num = index + 1;
                li.dataset.unit = unit.id;
                if (unit.id === state.currentUnit && unit.active) {
                    li.classList.add('active');
                }
                if (!unit.active) {
                    li.classList.add('disabled');
                }
                li.innerHTML = `
                    <span>${unit.icon} ${unit.title}</span>
                    <span class="unit-number">${!unit.active ? '🔒' : ''}</span>
                `;
                if (unit.active) {
                    li.addEventListener('click', () => {
                        switchUnit(unit.id);
                    });
                }
                list.appendChild(li);
            });
        }

        // ============================================================
        // التبديل بين الوحدات
        // ============================================================
        function switchUnit(unitId) {
            const unit = unitsData.find(u => u.id === unitId);
            if (!unit || !unit.active) return;
            state.currentUnit = unitId;
            saveState();
            renderSidebar();
            renderUnit(unitId);
            // إغلاق القائمة على الموبايل
            closeSidebar();
            // تمرير سلس للأعلى
            document.getElementById('mainContent').scrollTop = 0;
        }

        // ============================================================
        // عرض محتوى الوحدة
        // ============================================================
        function renderUnit(unitId) {
            const unit = unitsData.find(u => u.id === unitId);
            if (!unit || !unit.active) return;
            const content = unit.content;
            const main = document.getElementById('mainContent');

            // بناء HTML
            let html = `
                <div class="unit-title">
                    ${unit.icon} Unit ${unit.id}: ${unit.title}
                    <span>A1</span>
                </div>
            `;

            // 1. المحادثة
            html += `<div class="section" id="section-conversation">
                <div class="section-title">💬 المحادثة</div>
                <div class="conversation">`;
            content.conversation.forEach(msg => {
                const cls = msg.speaker.toLowerCase();
                html += `
                    <div class="bubble ${cls}">
                        <div class="speaker">${msg.speaker}</div>
                        ${msg.text}
                        <button class="audio-btn" data-text="${msg.text}" aria-label="استماع">🔊</button>
                        <div class="translation">${msg.translation}</div>
                    </div>
                `;
            });
            html += `</div></div>`;

            // 2. المفردات
            html += `<div class="section" id="section-vocabulary">
                <div class="section-title">📝 المفردات</div>
                <div class="vocab-grid">`;
            content.vocabulary.forEach((item, idx) => {
                html += `
                    <div class="flip-card" data-index="${idx}">
                        <div class="flip-card-inner">
                            <div class="flip-card-front">
                                <div class="emoji">${item.emoji}</div>
                                <div class="word">${item.word}</div>
                                <span style="font-size:12px;opacity:0.6;">👆 اضغط للقلب</span>
                            </div>
                            <div class="flip-card-back">
                                <div class="meaning">${item.meaning}</div>
                                <div class="example">"${item.example}"</div>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += `</div></div>`;

            // 3. القواعد (Tabs)
            html += `<div class="section" id="section-grammar">
                <div class="section-title">📖 القواعد: ${content.grammar.title}</div>
                <div class="tabs" id="grammarTabs">`;
            content.grammar.tabs.forEach((tab, idx) => {
                const active = idx === 0 ? 'active' : '';
                html += `<button class="tab-btn ${active}" data-tab="${idx}">${tab.label}</button>`;
            });
            html += `</div>`;
            content.grammar.tabs.forEach((tab, idx) => {
                const active = idx === 0 ? 'active' : '';
                html += `<div class="tab-content ${active}" data-tabcontent="${idx}">
                    <div class="grammar-example">${tab.content}</div>
                </div>`;
            });
            html += `</div>`;

            // 4. التمرين
            const progressKey = `unit_${unitId}`;
            const savedProgress = state.quizProgress[progressKey] || { completed: 0, answers: [] };
            html += `<div class="section" id="section-practice">
                <div class="section-title">✏️ التمرين</div>
                <div id="quizContainer">`;
            // عرض الأسئلة
            content.practice.forEach((q, idx) => {
                const answered = savedProgress.answers[idx] !== undefined;
                const selected = savedProgress.answers[idx] || -1;
                html += `<div class="quiz-card" data-q="${idx}">
                    <div class="question">${idx+1}. ${q.question}</div>
                    <div class="quiz-options">`;
                q.options.forEach((opt, optIdx) => {
                    let cls = '';
                    if (answered) {
                        if (optIdx === q.correct) cls = 'correct';
                        else if (optIdx === selected && optIdx !== q.correct) cls = 'wrong';
                    }
                    html += `<button class="${cls}" data-q="${idx}" data-opt="${optIdx}" ${answered ? 'disabled' : ''}>${opt}</button>`;
                });
                html += `</div></div>`;
            });
            // شريط التقدم
            const completedCount = savedProgress.answers.filter(a => a !== undefined).length;
            const pct = Math.min((completedCount / content.practice.length) * 100, 100);
            html += `
                <div class="quiz-progress">
                    <span>التقدم:</span>
                    <div class="track"><div class="fill" style="width:${pct}%;"></div></div>
                    <span>${completedCount}/${content.practice.length}</span>
                </div>
            `;
            html += `</div></div>`;

            // أزرار التنقل
            html += `
                <div class="nav-buttons">
                    <button class="nav-btn secondary" id="prevUnitBtn" ${unitId <= 1 ? 'disabled' : ''}>⬅ السابق</button>
                    <button class="nav-btn" id="nextUnitBtn" ${unitId >= 12 ? 'disabled' : ''}>التالي ➡</button>
                </div>
            `;

            main.innerHTML = html;

            // ===== ربط الأحداث =====

            // أزرار الصوت (Speech Synthesis)
            document.querySelectorAll('.audio-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const text = this.dataset.text;
                    speakText(text);
                });
            });

            // بطاقات الفلوب
            document.querySelectorAll('.flip-card').forEach(card => {
                card.addEventListener('click', function() {
                    this.classList.toggle('flipped');
                });
            });

            // Tabs القواعد
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tabIdx = this.dataset.tab;
                    // إزالة active من كل الأزرار والمحتوى
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    document.querySelector(`.tab-content[data-tabcontent="${tabIdx}"]`).classList.add('active');
                });
            });

            // أسئلة التمرين
            document.querySelectorAll('.quiz-options button:not([disabled])').forEach(btn => {
                btn.addEventListener('click', function() {
                    const qIdx = parseInt(this.dataset.q);
                    const optIdx = parseInt(this.dataset.opt);
                    const qData = content.practice[qIdx];
                    const isCorrect = optIdx === qData.correct;

                    // تعطيل جميع الأزرار في هذا السؤال
                    const parent = this.closest('.quiz-options');
                    parent.querySelectorAll('button').forEach(b => b.disabled = true);

                    // تطبيق التلوين
                    parent.querySelectorAll('button').forEach(b => {
                        const idx = parseInt(b.dataset.opt);
                        if (idx === qData.correct) b.classList.add('correct');
                        else if (idx === optIdx && !isCorrect) b.classList.add('wrong');
                    });

                    // حفظ الإجابة
                    const progressKey = `unit_${unitId}`;
                    if (!state.quizProgress[progressKey]) {
                        state.quizProgress[progressKey] = { completed: 0, answers: [] };
                    }
                    state.quizProgress[progressKey].answers[qIdx] = optIdx;
                    // تحديث عدد المكتملات
                    const answers = state.quizProgress[progressKey].answers;
                    const completed = answers.filter(a => a !== undefined).length;
                    state.quizProgress[progressKey].completed = completed;
                    state.dailyCompleted = completed; // يومياً = تمارين الوحدة الحالية

                    saveState();
                    updateDailyProgress();

                    // إعادة عرض التمرين لتحديث شريط التقدم
                    renderUnit(unitId);

                    // إذا اكتمل 3/3 => Streak!
                    const totalQ = content.practice.length;
                    if (completed === totalQ) {
                        showStreak();
                    }
                });
            });

            // أزرار التنقل
            document.getElementById('prevUnitBtn').addEventListener('click', function() {
                if (unitId > 1) {
                    const prev = unitsData.find(u => u.id === unitId - 1);
                    if (prev && prev.active) switchUnit(prev.id);
                }
            });
            document.getElementById('nextUnitBtn').addEventListener('click', function() {
                if (unitId < 12) {
                    const next = unitsData.find(u => u.id === unitId + 1);
                    if (next && next.active) switchUnit(next.id);
                }
            });

            // تمرير سلس لأول قسم بعد التحميل
            setTimeout(() => {
                const firstSection = document.querySelector('.section');
                if (firstSection) firstSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }

        // ============================================================
        // النطق باستخدام Speech Synthesis
        // ============================================================
        function speakText(text) {
            if (!window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            utterance.pitch = 1;
            window.speechSynthesis.cancel(); // إلغاء أي نطق سابق
            window.speechSynthesis.speak(utterance);
        }

        // ============================================================
        // Streak Notification
        // ============================================================
        function showStreak() {
            state.streak = (state.streak || 0) + 1;
            saveState();
            document.getElementById('streakCount').textContent = state.streak;
            document.getElementById('streakNotification').classList.add('show');
            document.getElementById('streakOverlay').classList.add('show');

            // إغلاق بعد 3 ثوان
            setTimeout(() => {
                document.getElementById('streakNotification').classList.remove('show');
                document.getElementById('streakOverlay').classList.remove('show');
            }, 3000);
        }

        // ============================================================
        // القائمة الجانبية (تبديل على الموبايل)
        // ============================================================
        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebarOverlay').classList.add('show');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('show');
        }
        document.getElementById('menuToggle').addEventListener('click', openSidebar);
        document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

        // ============================================================
        // تبديل الوضع الليلي/النهاري
        // ============================================================
        document.getElementById('themeToggle').addEventListener('click', function() {
            state.darkMode = !state.darkMode;
            document.body.classList.toggle('dark-mode');
            this.textContent = state.darkMode ? '☀️' : '🌙';
            saveState();
        });

        // ============================================================
        // زر الفيديو
        // ============================================================
        document.getElementById('videoBtn').addEventListener('click', function() {
            window.open('https://youtube.com/@omar.youssif.english', '_blank');
        });

        // ============================================================
        // تهيئة التطبيق
        // ============================================================
        function init() {
            loadState();
            renderSidebar();
            renderUnit(state.currentUnit);
            // إذا لم توجد تمارين مكتملة اليوم، نضبط dailyCompleted من الحالة المحفوظة
            if (!state.dailyCompleted) {
                const progressKey = `unit_${state.currentUnit}`;
                const prog = state.quizProgress[progressKey];
                if (prog) {
                    state.dailyCompleted = prog.answers ? prog.answers.filter(a => a !== undefined).length : 0;
                }
                updateDailyProgress();
            }
        }

        // بدء التشغيل
        init();
    </script>
</body>
    </html>
